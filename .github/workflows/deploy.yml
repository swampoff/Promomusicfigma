name: Deploy to VPS
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and Build
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: https://promofm.org
          VITE_SUPABASE_PROJECT_ID: qzpmiiqfwkcnrhvubdgt
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 89.104.94.93
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          source: "dist/*"
          target: "/var/www/promofm/html/"
          strip_components: 1

      - name: Restart backend and verify
        uses: appleboy/ssh-action@v1
        with:
          host: 89.104.94.93
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            systemctl restart promofm-api
            sleep 3
            curl -s https://promofm.org/server/health
